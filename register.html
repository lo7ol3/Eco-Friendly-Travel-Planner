<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | EcoTravel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
body {
  background: #f4f8ff;
  font-family: 'DM Sans', sans-serif;
}

.navbar {
  background: linear-gradient(90deg, #0f2a44, #1f4e79);
}

.navbar-brand {
  color: white !important;
  font-family: 'Playfair Display', serif;
}

.btn-save {
  background: #f97316;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 10px;
}
.btn-save:hover { background: #ea580c; }

.container-box {
  max-width: 450px;
  margin: 80px auto;
  background: white;
  padding: 25px;
  border-radius: 16px;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg px-3">
  <a class="navbar-brand" href="#">Eco<span style="color:#f97316;">Travel</span></a>
</nav>

<div class="container-box">
  <h3>Register</h3>

  <form id="registerForm">
    <input class="form-control mb-2" id="name" placeholder="Full Name" required>
    <input class="form-control mb-2" id="email" placeholder="Email" required>
    <input type="password" class="form-control mb-2" id="password" placeholder="Password" required>

    <button class="btn-save w-100">Create Account</button>
  </form>

  <p class="mt-3">Already have an account? <a href="login.html">Login</a></p>
</div>

<script src="auth.js"></script>
</body>
</html>
