<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Friendly Travel Planner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
      <div class="container">
        <a class="navbar-brand" href="#">Eco-Travel</a>
        <div class="navbar-nav">
          <a class="nav-link active" href="#">Weather</a>
          <a class="nav-link" href="#">Itinerary</a>
        </div>
      </div>
    </nav>

    <div class="container mt-5">
        <h2 class="mb-4">Check Weather for Your Destination</h2>
        
        <div class="input-group mb-3">
            <input type="text" id="cityInput" class="form-control" placeholder="Enter city name (e.g., Tokyo)">
            <button class="btn btn-primary" type="button" onclick="searchWeather()">Get Forecast</button>
        </div>

        <div id="weatherCard" class="card d-none" style="width: 18rem;">
            <div class="card-body">
                <h5 id="cityName" class="card-title text-capitalize">City</h5>
                <h6 id="tempDisplay" class="card-subtitle mb-2 text-muted">--°C</h6>
                <p id="weatherAdvice" class="card-text">Loading eco-tips...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
