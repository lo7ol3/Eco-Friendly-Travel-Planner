<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register | EcoTravel</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success sticky-top">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">EcoTravel</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- REGISTER CARD -->
<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Create account</h2>
    <p class="auth-sub">Join EcoTravel and start your green journey</p>

    <form onsubmit="registerUser(event)">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input id="regName" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input id="regEmail" type="email" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input id="regPassword" type="password" class="form-control" required>
      </div>

      <button class="btn btn-success w-100">Create Account</button>
    </form>

    <div class="divider">or</div>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Sign in</a>
    </div>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
