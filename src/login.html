<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | EcoTravel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #04121f;
      --navy-mid: #08233d;
      --navy-light: #1f4e79;
      --primary: #28cdff;
--primary-light: #124555;
      --bg: #f0f5fb;
      --card: #ffffff;
      --text: #3d84cc;
      --muted: #6b7280;
      --border: #dde6f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAVBAR ── */
    .navbar {
      background: linear-gradient(90deg, var(--navy), var(--navy-mid));
      padding: 0.9rem 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }
    .navbar-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      color: #fff !important;
      letter-spacing: 0.5px;
    }
    .navbar-brand span { color: var(--orange); }

    /* ── CENTERED LAYOUT ── */
    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.09);
      padding: 2.5rem 2.25rem;
    }
    .auth-card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      color: var(--navy-light);
      margin-bottom: 0.4rem;
    }
    .auth-card-sub {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .form-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.3px;
      margin-bottom: 0.35rem;
    }
    .form-control {
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.9rem;
      padding: 0.65rem 0.9rem;
      background: #f8fafd;
      transition: border 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
      border-color: var(--navy-light);
      box-shadow: 0 0 0 3px rgba(31,78,121,0.1);
      background: #fff;
    }
    .mb-form { margin-bottom: 1.1rem; }

    .btn-primary-eco {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.7rem;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .btn-primary-eco:hover { opacity: 0.9; transform: translateY(-1px); }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.83rem;
      color: var(--muted);
    }
    .auth-footer a { color: var(--navy-light); text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { color: var(--orange); }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.75rem;
      color: var(--muted);
      margin: 1.4rem 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="#">EcoTravel</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-content="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="directory.html">Directory</a></li>
                    <li class="nav-item"><a class="nav-link" href="itinerary.html">Itinerary</a></li>
                    <li class="nav-item"><a class="nav-link" href="weather.html">Weather</a></li>
                    <li class="nav-item"><a class="nav-link" href="calculator.html">Carbon Calculator</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
                </ul>
            </div>
        </div>
    </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h2 class="auth-card-title">Welcome back</h2>
      <p class="auth-card-sub">Sign in to continue your journey</p>

      <form onsubmit="loginUser(event)">
        <div class="mb-form">
          <label class="form-label">Email address</label>
          <input id="loginEmail" type="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="mb-form">
          <label class="form-label">Password</label>
          <input id="loginPassword" type="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button class="btn-primary-eco" type="submit">Sign In</button>
      </form>

      <div class="divider">or</div>

      <div class="auth-footer">
        New to EcoTravel? <a href="register.html">Create an account</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
