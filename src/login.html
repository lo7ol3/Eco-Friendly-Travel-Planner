<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | EcoTravel</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand" href="#">EcoTravel</a>

    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
        <li class="nav-item"><a class="nav-link" href="directory.html">Directory</a></li>
        <li class="nav-item"><a class="nav-link" href="itinerary.html">Itinerary</a></li>
        <li class="nav-item"><a class="nav-link" href="calculator.html">Carbon Calculator</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- LOGIN CARD -->
<div class="auth-wrapper">
  <div class="auth-card">
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Sign in to continue your journey</p>

    <form onsubmit="loginUser(event)">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input id="loginEmail" type="email" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <input id="loginPassword" type="password" class="form-control" required>
      </div>

      <button class="btn btn-success w-100">Sign In</button>
    </form>

    <div class="divider">or</div>

    <div class="auth-footer">
      New to EcoTravel? <a href="register.html">Create an account</a>
    </div>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>
