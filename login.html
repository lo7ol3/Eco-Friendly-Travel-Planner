<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | EcoTravel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

<style>
body {
  background: #f4f8ff;
  font-family: 'DM Sans', sans-serif;
}

.navbar {
  background: linear-gradient(90deg, #0f2a44, #1f4e79);
}

.container-box {
  max-width: 450px;
  margin: 80px auto;
  background: white;
  padding: 25px;
  border-radius: 16px;
}

.btn-save {
  background: #f97316;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<nav class="navbar px-3">
  <span class="navbar-brand">Eco<span style="color:#f97316;">Travel</span></span>
</nav>

<div class="container-box">
  <h3>Login</h3>

  <form id="loginForm">
    <input class="form-control mb-2" id="loginEmail" placeholder="Email" required>
    <input type="password" class="form-control mb-2" id="loginPassword" placeholder="Password" required>

    <button class="btn-save w-100">Login</button>
  </form>

  <p class="mt-3">No account? <a href="register.html">Register</a></p>
</div>

<script src="auth.js"></script>
</body>
</html>
